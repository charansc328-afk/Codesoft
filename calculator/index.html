<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Modern interactive calculator with dark theme and smooth animations." />
  <title>Calculator | TechCalc</title>

  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===========================
       BACKGROUND DECORATIONS
  =========================== -->
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <!-- ===========================
       CALCULATOR WRAPPER
  =========================== -->
  <main class="calc-wrapper" role="main">
    <div class="calculator" id="calculator" aria-label="Calculator">

      <!-- ── DISPLAY AREA ── -->
      <div class="display" id="display" aria-live="polite" aria-label="Calculator display">
        <!-- Expression / previous input line -->
        <div class="display-expression" id="expression" aria-label="Previous expression"></div>
        <!-- Main current value -->
        <div class="display-current" id="current" aria-label="Current value">0</div>
      </div>

      <!-- ── BUTTON GRID ── -->
      <div class="btn-grid" role="group" aria-label="Calculator buttons">

        <!-- Row 1: Clear, Delete, Percent, Divide -->
        <button class="btn btn-fn"   id="btn-clear"   data-action="clear"   aria-label="Clear">C</button>
        <button class="btn btn-fn"   id="btn-delete"  data-action="delete"  aria-label="Delete">⌫</button>
        <button class="btn btn-fn"   id="btn-percent" data-action="percent" aria-label="Percent">%</button>
        <button class="btn btn-op"   id="btn-div"     data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2: 7 8 9 Multiply -->
        <button class="btn btn-num"  id="btn-7"       data-action="number"  data-value="7"  aria-label="7">7</button>
        <button class="btn btn-num"  id="btn-8"       data-action="number"  data-value="8"  aria-label="8">8</button>
        <button class="btn btn-num"  id="btn-9"       data-action="number"  data-value="9"  aria-label="9">9</button>
        <button class="btn btn-op"   id="btn-mul"     data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3: 4 5 6 Subtract -->
        <button class="btn btn-num"  id="btn-4"       data-action="number"  data-value="4"  aria-label="4">4</button>
        <button class="btn btn-num"  id="btn-5"       data-action="number"  data-value="5"  aria-label="5">5</button>
        <button class="btn btn-num"  id="btn-6"       data-action="number"  data-value="6"  aria-label="6">6</button>
        <button class="btn btn-op"   id="btn-sub"     data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4: 1 2 3 Add -->
        <button class="btn btn-num"  id="btn-1"       data-action="number"  data-value="1"  aria-label="1">1</button>
        <button class="btn btn-num"  id="btn-2"       data-action="number"  data-value="2"  aria-label="2">2</button>
        <button class="btn btn-num"  id="btn-3"       data-action="number"  data-value="3"  aria-label="3">3</button>
        <button class="btn btn-op"   id="btn-add"     data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5: +/- 0 Decimal Equals -->
        <button class="btn btn-num"  id="btn-sign"    data-action="sign"    aria-label="Toggle sign">+/−</button>
        <button class="btn btn-num"  id="btn-0"       data-action="number"  data-value="0"  aria-label="0">0</button>
        <button class="btn btn-num"  id="btn-dot"     data-action="decimal" aria-label="Decimal">.</button>
        <button class="btn btn-eq"   id="btn-eq"      data-action="equals"  aria-label="Equals">=</button>

      </div>
      <!-- end .btn-grid -->

    </div>
    <!-- end .calculator -->
  </main>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
